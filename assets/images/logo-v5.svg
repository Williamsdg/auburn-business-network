<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="v5-navy-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a3a6b"/>
      <stop offset="100%" stop-color="#03244d"/>
    </linearGradient>
    <linearGradient id="v5-orange-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F26522"/>
      <stop offset="100%" stop-color="#d4550f"/>
    </linearGradient>
    <clipPath id="v5-rect-clip">
      <rect x="10" y="10" width="380" height="380" rx="28"/>
    </clipPath>
  </defs>

  <!-- Rounded rectangle background -->
  <rect x="10" y="10" width="380" height="380" rx="28" fill="url(#v5-navy-grad)"/>

  <!-- Subtle orange border -->
  <rect x="10" y="10" width="380" height="380" rx="28" fill="none" stroke="#F26522" stroke-width="1.5" opacity="0.15"/>

  <!-- Faint campus silhouette -->
  <g clip-path="url(#v5-rect-clip)" opacity="0.05" fill="#FFFFFF">
    <rect x="10" y="285" width="380" height="60"/>
    <rect x="140" y="205" width="120" height="80"/>
    <rect x="178" y="135" width="44" height="70"/>
    <polygon points="200,95 175,135 225,135"/>
    <ellipse cx="200" cy="138" rx="25" ry="8"/>
    <rect x="70" y="235" width="65" height="50"/>
    <rect x="265" y="235" width="65" height="50"/>
    <circle cx="45" cy="255" r="18"/>
    <circle cx="355" cy="255" r="18"/>
  </g>

  <!-- BUY text -->
  <text x="200" y="195" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="100" fill="#FFFFFF" text-anchor="middle" letter-spacing="10">BUY</text>

  <!-- AUBURN text -->
  <text x="200" y="272" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="68" fill="#F26522" text-anchor="middle" letter-spacing="5">AUBURN</text>

  <!-- Orange underline -->
  <rect x="85" y="286" width="230" height="3.5" rx="2" fill="url(#v5-orange-grad)" opacity="0.8"/>

  <!-- Tagline -->
  <text x="200" y="325" font-family="Arial,Helvetica,sans-serif" font-weight="500" font-size="12" fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="3.5">SUPPORT THE AUBURN FAMILY</text>
</svg>