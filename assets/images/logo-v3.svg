<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <defs>
    <linearGradient id="v3-navy-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a3a6b"/>
      <stop offset="100%" stop-color="#03244d"/>
    </linearGradient>
    <linearGradient id="v3-orange-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F26522"/>
      <stop offset="100%" stop-color="#d4550f"/>
    </linearGradient>
    <clipPath id="v3-rect-clip">
      <rect x="0" y="0" width="500" height="200" rx="10"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="500" height="200" rx="10" fill="url(#v3-navy-grad)"/>

  <!-- Faint campus silhouette -->
  <g clip-path="url(#v3-rect-clip)" opacity="0.05" fill="#FFFFFF">
    <rect x="0" y="150" width="500" height="50"/>
    <rect x="200" y="95" width="110" height="55"/>
    <rect x="232" y="50" width="46" height="45"/>
    <polygon points="255,18 230,52 280,52"/>
    <ellipse cx="255" cy="53" rx="26" ry="7"/>
    <rect x="100" y="115" width="90" height="35"/>
    <rect x="320" y="110" width="80" height="40"/>
    <rect x="410" y="120" width="50" height="30"/>
    <circle cx="60" cy="130" r="18"/>
    <circle cx="460" cy="125" r="16"/>
    <circle cx="175" cy="120" r="12"/>
  </g>

  <!-- Orange bar accent left -->
  <rect x="0" y="0" width="8" height="200" fill="url(#v3-orange-grad)"/>
  <rect x="14" y="30" width="2" height="140" fill="#F26522" opacity="0.3"/>

  <!-- BUY text -->
  <text x="44" y="88" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="54" fill="#FFFFFF" letter-spacing="6">BUY</text>

  <!-- AUBURN text -->
  <text x="44" y="140" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="54" fill="#F26522" letter-spacing="4">AUBURN</text>

  <!-- Orange underline -->
  <rect x="44" y="150" width="200" height="2" fill="#F26522" opacity="0.3" rx="1"/>

  <!-- Tagline -->
  <text x="44" y="175" font-family="Arial,Helvetica,sans-serif" font-weight="500" font-size="10.5" fill="rgba(255,255,255,0.4)" letter-spacing="3">SUPPORT THE AUBURN FAMILY</text>
</svg>